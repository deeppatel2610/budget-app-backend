services:
  - type: web
    name: budget-app-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: budget-app-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: budget-app-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: budget-app-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: budget-app-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: budget-app-db
          property: database

databases:
  - name: budget-app-db
    plan: free
